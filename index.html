<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐟 SFM Results Live v20</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root {
  --navy:    #080f1e;
  --navy2:   #0d1b35;
  --navy3:   #142850;
  --blue:    #1565c0;
  --cyan:    #00c8e0;
  --cyan2:   #00e5ff;
  --gold:    #ffd600;
  --silver:  #b0bec5;
  --bronze:  #ff8f00;
  --green:   #00e676;
  --red:     #ff1744;
  --white:   #e8f4ff;
  --muted:   #7a9bbf;
  --card:    #0d1f3c;
  --border:  rgba(0,200,224,0.12);
  --border2: rgba(0,200,224,0.25);
  --amber:   #f4a261;
  --orange:  #ff6b2b;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; overflow-x:hidden; }

/* ── HEADER ─────────────────────────────────────────────── */
.header {
  background:linear-gradient(160deg,var(--navy3) 0%,var(--navy2) 100%);
  border-bottom:1px solid var(--border2);
  padding:12px 16px 8px;
  position:sticky; top:0; z-index:200;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.header-row1 { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.app-title { font-family:'Bebas Neue',sans-serif; font-size:1.5em; letter-spacing:3px; color:var(--cyan); line-height:1; }
.app-subtitle { font-size:.7em; color:var(--muted); margin-top:1px; letter-spacing:1px; }
.live-pill {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,23,68,0.15); border:1px solid rgba(255,23,68,0.4);
  border-radius:20px; padding:4px 11px;
  font-size:0.75em; font-weight:700; color:var(--red);
  white-space:nowrap; flex-shrink:0;
}
.live-dot { width:7px; height:7px; background:var(--red); border-radius:50%; animation:blink 1.3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

/* ── RACE SELECTOR ─────────────────────────────────────── */
.race-selector { margin-top:8px; position:relative; }
.race-select {
  width:100%; padding:10px 36px 10px 12px;
  background:rgba(0,200,224,0.08); border:1px solid var(--border2);
  border-radius:10px; color:var(--white);
  font-family:'IBM Plex Sans',sans-serif; font-size:0.85em; font-weight:600;
  appearance:none; cursor:pointer; outline:none;
}
.race-select option { background:var(--navy2); color:var(--white); }
.select-arrow { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--cyan); pointer-events:none; }
.race-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.meta-chip { font-size:.7em; font-weight:600; background:rgba(0,200,224,0.1); border:1px solid var(--border); border-radius:8px; padding:2px 8px; color:var(--muted); }
.meta-chip.gt { background:rgba(255,214,0,0.1); border-color:rgba(255,214,0,0.3); color:var(--gold); }

/* ── NAV TABS ───────────────────────────────────────────── */
.nav-tabs { display:flex; gap:0; background:var(--navy2); border-bottom:1px solid var(--border2); }
.nav-tab {
  flex:1; padding:11px 4px;
  border:none; border-bottom:3px solid transparent;
  background:transparent; color:var(--muted);
  font-family:'IBM Plex Sans',sans-serif; font-size:.75em; font-weight:700;
  cursor:pointer; transition:all .2s; text-align:center;
}
.nav-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.nav-tab.gold-tab { background:linear-gradient(135deg,rgba(255,214,0,.15),rgba(255,143,0,.1)); color:var(--gold); }
.nav-tab.gold-tab.active { border-bottom-color:var(--gold); }

/* ── MAIN ───────────────────────────────────────────────── */
.main { padding:12px 14px 100px; }

/* ── STATES ─────────────────────────────────────────────── */
.center-state { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:50vh; gap:14px; text-align:center; }
.state-icon  { font-size:3em; }
.state-title { font-family:'Bebas Neue',sans-serif; font-size:1.6em; letter-spacing:3px; color:var(--cyan); }
.state-text  { font-size:0.85em; color:var(--muted); line-height:1.6; max-width:260px; }
.spinner     { width:36px; height:36px; border:3px solid var(--border2); border-top-color:var(--cyan); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── SEARCH ─────────────────────────────────────────────── */
.search-wrap { position:relative; margin-bottom:12px; }
.search-input {
  width:100%; padding:10px 14px 10px 38px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:10px; color:var(--white);
  font-family:'IBM Plex Sans',sans-serif; font-size:.9em; outline:none;
}
.search-input:focus { border-color:var(--cyan); }
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }
.search-result-highlight { background:rgba(0,200,224,0.12) !important; border-left:3px solid var(--cyan) !important; }

/* ── SECTOR BLOCK (Κλήρωση) ─────────────────────────────── */
.sector-block { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; }
.sector-block-hdr {
  padding:10px 14px;
  background:linear-gradient(90deg,rgba(0,200,224,0.12),transparent);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sector-block-title { font-family:'Bebas Neue',sans-serif; font-size:1.1em; letter-spacing:2px; color:var(--cyan); }
.sector-block-sub { font-size:.72em; color:var(--muted); }
.draw-table { width:100%; border-collapse:collapse; font-size:.82em; table-layout:fixed; }
.draw-table col.col-pos { width:42px; }
.draw-table col.col-athlete { width:55%; }
.draw-table thead th { background:rgba(0,200,224,0.06); color:var(--muted); font-size:.68em; font-weight:700; letter-spacing:.8px; text-transform:uppercase; padding:5px 8px; border-bottom:1px solid var(--border); text-align:left; }
.draw-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); }
.draw-table tbody tr:last-child { border-bottom:none; }
.draw-table td { padding:7px 8px; vertical-align:middle; }
.draw-table td.club-cell { font-size:.78em; color:var(--muted); word-break:break-word; }
.pos-cell { font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:.9em; color:var(--cyan); text-align:center; }

/* ── PROGRESS ───────────────────────────────────────────── */
.progress-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:12px; display:flex; align-items:center; gap:14px; }
.progress-nums { font-family:'Bebas Neue',sans-serif; font-size:1.8em; color:var(--cyan); line-height:1; white-space:nowrap; }
.progress-label { font-size:.75em; color:var(--muted); margin-top:2px; }
.pbar-wrap { flex:1; height:6px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden; }
.pbar-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--cyan)); border-radius:99px; transition:width .6s ease; }

/* ── PUBLISHED AT banner ────────────────────────────────── */
.pub-banner {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:rgba(0,230,118,0.07); border:1px solid rgba(0,230,118,0.2);
  border-radius:10px; padding:8px 14px; margin-bottom:12px;
  font-size:.75em;
}
.pub-time { color:var(--green); font-weight:700; }
.pub-label { color:var(--muted); }

/* ── SECTOR STRIP ───────────────────────────────────────── */
.sector-strip { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none; margin-bottom:10px; }
.sector-strip::-webkit-scrollbar { display:none; }
.sector-chip { flex-shrink:0; padding:6px 14px; background:var(--card); border:1px solid var(--border); border-radius:20px; font-size:.82em; font-weight:700; color:var(--muted); cursor:pointer; transition:all .2s; }
.sector-chip.active { background:var(--blue); border-color:var(--cyan); color:white; }

/* ── RESULTS CARD ───────────────────────────────────────── */
.results-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; }
.results-card-hdr { padding:10px 14px; background:rgba(0,200,224,0.06); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.results-card-title { font-family:'Bebas Neue',sans-serif; font-size:1.05em; letter-spacing:2px; color:var(--cyan); }
.done-badge { color:var(--green); font-size:.75em; font-weight:700; }

/* ── RESULT TABLE ───────────────────────────────────────── */
.rtable { width:100%; border-collapse:collapse; font-size:.875em; }
.rtable thead th { background:rgba(0,200,224,0.07); color:var(--muted); font-size:.72em; font-weight:700; letter-spacing:.8px; text-transform:uppercase; padding:6px 8px; border-bottom:1px solid var(--border); }
.rtable tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); }
.rtable tbody tr:last-child { border-bottom:none; }
.rtable td { padding:6px 8px; vertical-align:middle; }
.rtable tbody tr.r1   { background:rgba(255,214,0,0.05); }
.rtable tbody tr.r2   { background:rgba(176,190,197,0.04); }
.rtable tbody tr.r3   { background:rgba(255,143,0,0.04); }
.rtable tbody tr.loaned-row { background:rgba(255,107,43,0.06); }
.rank-cell { font-family:'Bebas Neue',sans-serif; font-size:1.35em; text-align:center; width:38px; }
.rk1{color:var(--gold);}  .rk2{color:var(--silver);}  .rk3{color:var(--bronze);}  .rko{color:var(--muted);}
.score-val  { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:.95em; color:var(--cyan); text-align:right; white-space:nowrap; }
.score-unit { font-size:.7em; color:var(--muted); font-weight:400; }
.sub-score  { font-size:.72em; color:var(--muted); font-family:'IBM Plex Mono',monospace; text-align:right; white-space:nowrap; }
.ath-name   { font-weight:700; color:var(--white); font-size:.85em; line-height:1.3; }
.ath-name.loaned { color:var(--orange); }
.ath-club   { font-size:.72em; color:var(--muted); margin-top:1px; }
.ath-sponsor{ font-size:.7em; color:var(--amber); margin-top:1px; }
.ptype-badge { display:inline-block; padding:0px 4px; border-radius:3px; font-size:.65em; font-weight:700; margin-left:3px; vertical-align:middle; }
.ptype-AO { background:rgba(255,214,0,0.18); color:var(--gold); }
.ptype-A  { background:rgba(0,200,224,0.18); color:var(--cyan); }
.ptype-O  { background:rgba(0,230,118,0.18); color:var(--green); }
.loaned-pos { color:var(--orange); font-size:.72em; font-weight:700; font-family:'IBM Plex Mono',monospace; }
.virtual-badge { display:inline-block; background:var(--orange); color:white; padding:2px 8px; border-radius:4px; font-size:.65em; font-weight:700; margin-left:8px; vertical-align:middle; }
.fish-chips { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
.fish-chip  { display:inline-flex; align-items:center; height:20px; padding:2px 7px; border-radius:10px; font-size:11px; font-weight:600; background:#1a3a5c; border:1px solid rgba(0,200,224,0.3); color:#90caf9; font-family:'IBM Plex Mono',monospace; flex:0 0 auto; }
.fish-chip.max { background:var(--orange); border-color:var(--orange); color:white; font-weight:700; }
.overall-table-wrap { overflow-x:auto; }
.overall-table-wrap .rtable { min-width:360px; }

/* ── TEAM COUNTING/DROPPED ─────────────────────────────── */
.team-members { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.member-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:8px; font-size:.7em; font-weight:600; background:rgba(0,200,224,0.1); border:1px solid var(--border); color:var(--white); }
.member-chip.dropped { background:rgba(255,23,68,0.1); border-color:rgba(255,23,68,0.3); color:var(--muted); text-decoration:line-through; opacity:.6; }
.member-rank { font-family:'IBM Plex Mono',monospace; color:var(--cyan); }

/* ── CHAMPIONSHIP ───────────────────────────────────────── */
.champ-banner { background:linear-gradient(135deg,rgba(255,214,0,.08),rgba(255,143,0,.06)); border:1px solid rgba(255,214,0,.25); border-radius:10px; padding:12px 16px; margin-bottom:12px; }

/* ── TOAST ──────────────────────────────────────────────── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--navy2); border:1px solid var(--cyan); color:var(--white); padding:10px 22px; border-radius:99px; font-size:.88em; font-weight:600; z-index:9999; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── MISC ───────────────────────────────────────────────── */
.footer { text-align:center; font-size:.7em; color:var(--muted); opacity:.4; margin-top:20px; }
.refresh-btn { background:rgba(0,200,224,.12); border:1px solid rgba(0,200,224,.3); color:var(--cyan); border-radius:6px; padding:4px 12px; font-size:.78em; cursor:pointer; }
.no-results-btn { padding:14px 28px; background:linear-gradient(135deg,var(--blue),var(--cyan)); color:white; border:none; border-radius:12px; font-family:'IBM Plex Sans',sans-serif; font-size:1em; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row1">
    <div>
      <div class="app-title">🐟 SFM LIVE</div>
      <div class="app-subtitle">SPORT FISHING MANAGER</div>
    </div>
    <div class="live-pill" id="livePill" style="display:none;">
      <div class="live-dot"></div>LIVE
    </div>
  </div>
  <div class="race-selector" id="raceSelectorWrap" style="display:none;">
    <select class="race-select" id="raceSelect" onchange="onRaceChange()">
      <option value="">— Επιλογή Αγώνα —</option>
    </select>
    <div class="select-arrow">▾</div>
  </div>
  <div class="race-meta" id="raceMeta"></div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs" id="navTabs" style="display:none;">
  <button class="nav-tab active"   id="tab-draw"         onclick="showView('draw')">🎯 Κλήρωση</button>
  <button class="nav-tab"          id="tab-live"         onclick="showView('live')">📡 Live</button>
  <button class="nav-tab"          id="tab-individual"   onclick="showView('individual')">🥇 Ατομική</button>
  <button class="nav-tab"          id="tab-team"         onclick="showView('team')">🏅 Ομαδική</button>
  <button class="nav-tab"          id="tab-final"        onclick="showView('final')">📋 Τελική</button>
  <button class="nav-tab gold-tab" id="tab-championship" onclick="showView('championship')">🏆 Πρωτ/μα</button>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="center-state">
    <div class="spinner"></div>
    <div class="state-text">Φόρτωση αγώνων...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://lnknyxaozoyxxiqqaswi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxua255eGFvem95eHhpcXFhc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTMxMTYsImV4cCI6MjA4OTk2OTExNn0.MA86SoUGaPsaIxzEvLNnx9oCoewqTG0ivUEVTN9jAwQ';
const HDR = {
  'apikey':        SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type':  'application/json'
};
const POLL_INTERVAL = 30000; // 30 δευτερόλεπτα

// ============================================================
// STATE  (pure display — zero calculation)
// ============================================================
let races        = [];
let currentRace  = null;   // από races table
let raceResults  = null;   // από race_results table
let measProgress = { done: 0, total: 0 }; // μόνο για progress bar
let champData    = null;
let currentView  = 'draw';
let currentSector= null;
let pollingTimer = null;

// sessionStorage key για αποθήκευση τελευταίου tab
const SESSION_KEY = 'sfmlive_tab';

function saveTab(view) {
  try { sessionStorage.setItem(SESSION_KEY, view); } catch(e) {}
}
function savedTab(defaultView) {
  try { return sessionStorage.getItem(SESSION_KEY) || defaultView; } catch(e) { return defaultView; }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  const params  = new URLSearchParams(window.location.search);
  const raceUid = params.get('race');
  const champId = params.get('champ');

  if (raceUid)      await loadRaceByUid(raceUid);
  else if (champId) await loadRaceByChamp(champId);
  else              await loadRaces();
}

async function loadRaceByUid(uid) {
  showLoading();
  try {
    const res  = await sbFetch(`races?race_uid=eq.${enc(uid)}&is_active=eq.true&limit=1`);
    const rows = await res.json();
    if (!rows.length) { showError('Ο αγώνας δεν βρέθηκε ή δεν είναι ενεργός.<br><small>Ελέγξτε το link.</small>'); return; }
    races = rows;
    document.getElementById('raceSelectorWrap').style.display = 'none';
    currentView = savedTab('draw');
    await selectRace(rows[0].id);
  } catch(e) { showError(e.message); }
}

async function loadRaceByChamp(champId) {
  showLoading();
  try {
    const res  = await sbFetch(`races?championship_id=eq.${enc(champId)}&is_active=eq.true&order=round_number.desc&limit=10`);
    const rows = await res.json();
    if (!rows.length) { showError('Το πρωτάθλημα δεν βρέθηκε ή δεν έχει ενεργούς αγώνες.<br><small>Ελέγξτε το link.</small>'); return; }
    races = rows;
    if (rows.length > 1) populateDropdown();
    else document.getElementById('raceSelectorWrap').style.display = 'none';
    // Επαναφορά τελευταίου tab — αν δεν υπάρχει αποθηκευμένο, default = championship
    currentView = savedTab('championship');
    await selectRace(rows[0].id);
  } catch(e) { showError(e.message); }
}

async function loadRaces() {
  showLoading();
  try {
    const res  = await sbFetch('races?is_active=eq.true&order=created_at.desc&limit=50');
    races = await res.json();
    if (!races.length) { showNoRaces(); return; }
    populateDropdown();
    currentView = savedTab('draw');
    await selectRace(races[0].id);
  } catch(e) { showError(e.message); }
}

function populateDropdown() {
  const sel = document.getElementById('raceSelect');
  sel.innerHTML = '<option value="">— Επιλογή Αγώνα —</option>';
  races.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = `${r.race_title||r.race_code} · ${r.race_location||''} · Αγ.${r.round_number}`;
    sel.appendChild(opt);
  });
  document.getElementById('raceSelectorWrap').style.display = 'block';
}

async function onRaceChange() {
  const id = parseInt(document.getElementById('raceSelect').value);
  if (!id) return;
  stopPolling();
  await selectRace(id);
}

async function selectRace(id) {
  currentRace = races.find(r => r.id === id);
  if (!currentRace) return;
  document.getElementById('raceSelect').value = id;
  updateRaceMeta();
  document.getElementById('navTabs').style.display  = 'flex';
  document.getElementById('livePill').style.display = 'flex';
  await loadData();
  showView(currentView);
  startPolling();
}

function updateRaceMeta() {
  const r  = currentRace;
  const gt = r.game_type === 'float' ? '🎣 Float/Match' : '🎯 Casting';
  const rm = r.rank_mode || 'split';
  const rmLabel = rm === 'unified' ? 'Ενιαία' : rm === 'separate' ? 'Separate' : 'Split';
  document.getElementById('raceMeta').innerHTML = `
    <span class="meta-chip gt">${gt}</span>
    <span class="meta-chip">📅 ${r.race_date||'—'}</span>
    <span class="meta-chip">📍 ${r.race_location||'—'}</span>
    <span class="meta-chip">Αγ. ${r.round_number}</span>
    <span class="meta-chip">${rmLabel} · drop ${r.drop_worst??1}</span>`;
}

// ============================================================
// DATA LOADING  —  race_results + measurement progress
// ============================================================
async function loadData() {
  await Promise.all([ loadRaceResults(), loadMeasProgress() ]);
}

async function loadRaceResults() {
  try {
    const res  = await sbFetch(`race_results?race_id=eq.${currentRace.id}&limit=1`);
    const rows = await res.json();
    raceResults = rows.length ? rows[0] : null;
  } catch(e) { console.error('race_results error:', e); raceResults = null; }
}

async function loadMeasProgress() {
  try {
    const res   = await sbFetch(`measurements?race_id=eq.${currentRace.id}&completed=eq.true&select=sector`);
    const rows  = await res.json();
    const sectorCount = (currentRace.sectors || []).length;
    const isFloat = currentRace.game_type === 'float';
    measProgress = {
      done:  rows.length,
      total: isFloat ? sectorCount : sectorCount * (currentRace.pegs_per_sector || 5)
    };
  } catch(e) { console.error('meas progress error:', e); }
}

// ============================================================
// POLLING
// ============================================================
function startPolling() {
  stopPolling();
  pollingTimer = setInterval(async () => {
    await loadData();
    refreshCurrentView();
  }, POLL_INTERVAL);
}
function stopPolling() {
  if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
}
function refreshCurrentView() {
  if      (currentView === 'live')         renderLive();
  else if (currentView === 'individual')   renderIndividual();
  else if (currentView === 'team')         renderTeam();
  else if (currentView === 'final')        renderFinal();
  else if (currentView === 'championship') renderChampionship();
}

// ============================================================
// VIEWS
// ============================================================
function showView(view) {
  if (view !== currentView) currentSector = null;
  currentView = view;
  saveTab(view);
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + view);
  if (tabEl) tabEl.classList.add('active');

  if      (view === 'draw')         renderDraw();
  else if (view === 'live')         renderLive();
  else if (view === 'individual')   renderIndividual();
  else if (view === 'team')         renderTeam();
  else if (view === 'final')        renderFinal();
  else if (view === 'championship') renderChampionship();
}

function renderDraw() {
  const main = document.getElementById('mainContent');

  // Αν η κλήρωση δεν έχει παρουσιαστεί → κρύβουμε θέσεις
  if (!currentRace.cinema_played_at) {

  }

  const sectors = currentRace.sectors || [];
  const drawAthletes = currentRace.athletes || [];

  if (!sectors.length) {
    main.innerHTML = noDataHtml('Δεν υπάρχουν τομείς ακόμα.');
    return;
  }

  let html = `<div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="Αναζήτηση αθλητή..."

      .filter(a => a.sector === s.name)
      .sort((a,b) => a.position - b.position);

    html += `<div class="sector-block" data-sector="${s.name}">

        <span class="sector-block-title">ΤΟΜΕΑΣ ${s.name}</span>

          <th>ΑΘΛΗΤΗΣ</th>
          <th>ΣΥΛΛΟΓΟΣ</th>
        </tr></thead>
        <tbody>`;
    sAthletes.forEach(a => {
      const pt = a.participationType || (a.omadiko ? 'AO' : 'A');
      html += `<tr class="draw-row" data-name="${(a.lastname+' '+a.firstname).toLowerCase()}">

    html += `</tbody></table></div>`;
  });
  html += `<div class="footer">SFM Live v20 · Κλήρωση</div></div>`;
  main.innerHTML = html;
}

function filterDraw(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('.draw-row').forEach(row => {
    const match = !query || (row.dataset.name||'').includes(query);
    row.style.display = match ? '' : 'none';
    row.classList.toggle('search-result-highlight', match && !!query);
  });
  document.querySelectorAll('.sector-block').forEach(block => {
    if (!query) { block.style.display = ''; return; }
    const visible = block.querySelectorAll('.draw-row:not([style*="display: none"])').length;
    block.style.display = visible > 0 ? '' : 'none';
  });
}

  const champId  = currentRace?.championship_id;
  if (!champId) {
    main.innerHTML = noDataHtml('Αυτός ο αγώνας δεν ανήκει σε πρωτάθλημα.');
    return;
  }
  main.innerHTML = `<div class="center-state"><div class="spinner"></div><div class="state-text">Φόρτωση πρωταθλήματος...</div></div>`;
  try {
    const res  = await sbFetch(`championship_results?championship_id=eq.${enc(champId)}&order=published_at.desc&limit=1`);
    const rows = await res.json();
    if (!rows.length) {
      main.innerHTML = noDataHtml('Δεν υπάρχουν δημοσιευμένα αποτελέσματα πρωταθλήματος ακόμα.');
      return;
    }
    champData = rows[0];
    renderChampionshipData();
  } catch(e) {
    main.innerHTML = noDataHtml('❌ ' + e.message);
  }
}

function renderChampionshipData() {
  const main = document.getElementById('mainContent');
  const { championship_title, rounds_done, published_at, individual=[], team=[] } = champData;
  const medals = {1:'🥇',2:'🥈',3:'🥉'};
  const pubDate = new Date(published_at).toLocaleString('el-GR');
  const numRaces = individual.length ? (individual[0].raceResults||[]).length : 0;

  const indivRows = individual.map(a => {
    const medal = medals[a.champRank] || a.champRank;
    const rkc   = a.champRank<=3?`rk${a.champRank}`:'rko';
    const raceCols = (a.raceResults||[]).map(r =>
      r && r.rank<900
        ? `<td class="sub-score" style="text-align:center;">${r.points}</td><td class="sub-score" style="text-align:center;color:var(--cyan);font-weight:700;">${r.rank}</td>`
        : `<td class="sub-score" style="text-align:center;color:var(--muted);">0</td><td class="sub-score" style="text-align:center;color:var(--red);">—</td>`
    ).join('');
    return `<tr class="${a.champRank<=3?'r'+a.champRank:''}">
      <td class="rank-cell ${rkc}">${medal}</td>
      <td><div class="ath-name">${a.lastname} ${a.firstname}</div><div class="ath-club">${a.club||''}</div></td>
      ${raceCols}
      <td class="sub-score" style="text-align:center;color:var(--green);font-weight:700;">${a.totalPoints}</td>
      <td class="score-val" style="text-align:center;color:var(--gold);font-weight:700;">${a.totalRanks}</td>
    </tr>`;
  }).join('');

  const numRacesTeam = team.length ? (team[0].raceResults||[]).length : 0;
  const teamRows = team.map(t => {
    const medal = medals[t.rank] || t.rank;
    const rkc   = t.rank<=3?`rk${t.rank}`:'rko';
    const raceCols = (t.raceResults||[]).map(r =>
      r ? `<td class="sub-score" style="text-align:center;color:var(--cyan);">${r.dailyRank||'—'}</td><td class="sub-score" style="text-align:center;color:var(--amber);">${r.totalPenalty||'—'}</td>`
        : `<td class="sub-score" style="text-align:center;">—</td><td class="sub-score">—</td>`
    ).join('');
    return `<tr class="${t.rank<=3?'r'+t.rank:''}">
      <td class="rank-cell ${rkc}">${medal}</td>
      <td><div class="ath-name">${t.club}</div></td>
      ${raceCols}
      <td class="score-val" style="text-align:center;color:var(--gold);">${t.totalDailyRanks}</td>
      <td class="sub-score" style="text-align:center;color:var(--amber);">${t.totalPenalty}</td>
    </tr>`;
  }).join('');

  main.innerHTML = `<div>
    <div class="champ-banner">
      <div style="font-size:.7em;color:var(--gold);font-weight:700;letter-spacing:1px;">🏆 ΠΡΩΤΑΘΛΗΜΑ</div>
      <div style="font-size:.95em;font-weight:700;">${championship_title||champData.championship_id}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;">
        <span class="meta-chip" style="background:rgba(255,214,0,.12);color:var(--gold);">📊 ${rounds_done} Αγωνιστικές</span>
        <span style="font-size:.7em;color:var(--muted);">Ενημ: ${pubDate}</span>
        <button class="refresh-btn" onclick="renderChampionship()">🔄</button>
      </div>
    </div>

    <div class="results-card" style="margin-bottom:12px;">
      <div class="results-card-hdr"><span class="results-card-title">ΑΤΟΜΙΚΗ ΚΑΤΑΤΑΞΗ ΠΡΩΤΑΘΛΗΜΑΤΟΣ</span></div>
      <div class="overall-table-wrap">
        <table class="rtable">
          <thead>
            <tr>
              <th style="width:38px;">#</th><th>ΑΘΛΗΤΗΣ</th>
              ${Array.from({length:numRaces},(_,i)=>`<th colspan="2" style="text-align:center;color:var(--cyan);">${i+1}ος</th>`).join('')}
              <th style="text-align:center;color:var(--green);">Σύνολο</th>
              <th style="text-align:center;color:var(--gold);">Βαθμός</th>
            </tr>
            <tr><th colspan="2"></th>
              ${Array.from({length:numRaces},()=>`<th style="text-align:center;font-size:.68em;color:var(--muted);">Πόντοι</th><th style="text-align:center;font-size:.68em;color:var(--muted);">Κατ.</th>`).join('')}
              <th></th><th></th>
            </tr>
          </thead>
          <tbody>${indivRows||emptyRow(10,'Δεν υπάρχουν αποτελέσματα')}</tbody>
        </table>
      </div>
    </div>

    <div class="results-card">
      <div class="results-card-hdr"><span class="results-card-title">ΟΜΑΔΙΚΗ ΚΑΤΑΤΑΞΗ ΠΡΩΤΑΘΛΗΜΑΤΟΣ</span></div>
      <div class="overall-table-wrap">
        <table class="rtable">
          <thead>
            <tr>
              <th style="width:38px;">#</th><th>ΣΥΛΛΟΓΟΣ</th>
              ${Array.from({length:numRacesTeam},(_,i)=>`<th colspan="2" style="text-align:center;color:var(--cyan);">${i+1}ος</th>`).join('')}
              <th style="text-align:center;color:var(--gold);">Άθρ.Θέσεων</th>
              <th style="text-align:center;color:var(--amber);">Άθρ.Ποινών</th>
            </tr>
          </thead>
          <tbody>${teamRows||emptyRow(8,'Δεν υπάρχουν αποτελέσματα')}</tbody>
        </table>
      </div>
    </div>
    <div class="footer">SFM Live v20 · Πρωτάθλημα</div>
  </div>`;
}

// ============================================================
// RENDER HELPERS
// ============================================================
function buildFishChips(a, isFloat) {
  if (isFloat || !a.catches?.length) return '';
  const max = a.maxFish || 0;
  return `<div class="fish-chips">${a.catches.map(v =>
    `<span class="fish-chip${v===max?' max':''}">${v}cm</span>`
  ).join('')}</div>`;
}

function buildScoreCols(a, isFloat) {
  if (isFloat) {
    const w  = a.score   > 0 ? `${a.score} <span class="score-unit">gr</span>`   : '—';
    const mx = a.maxFish > 0 ? `${a.maxFish} <span class="score-unit">gr</span>` : '—';
    return `<td class="sub-score" style="text-align:right;">${w}</td>
            <td class="sub-score" style="text-align:right;">${mx}</td>`;
  } else {
    const fish = a.catches?.length || 0;
    const pts  = a.score || 0;
    const cm   = a.catches?.reduce((s,v)=>s+v,0) || 0;
    return `<td class="sub-score" style="text-align:center;">${fish||'—'}</td>
            <td class="sub-score" style="text-align:right;">${cm||'—'}</td>
            <td class="score-val" style="font-size:.82em;">${pts>0?`<span style="color:var(--amber);font-weight:700;">${pts}</span> <span class="score-unit">pts</span>`:'—'}</td>`;
  }
}

function pubBannerHtml(publishedAt) {
  if (!publishedAt) return '';
  const dt = new Date(publishedAt).toLocaleString('el-GR');
  return `<div class="pub-banner">
    <span class="pub-label">📡 Τελευταία ενημέρωση:</span>
    <span class="pub-time">${dt}</span>
    <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
  </div>`;
}

function progressHtml(pct) {
  return `<div class="progress-card">
    <div>
      <div class="progress-nums">${measProgress.done}/${measProgress.total}</div>
      <div class="progress-label">Καταμετρήσεις</div>
    </div>
    <div style="flex:1">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div style="font-size:.72em;color:var(--muted);margin-top:3px;">${pct}% ολοκληρώθηκε</div>
    </div>
  </div>`;
}

async function manualRefresh() {
  await loadData();
  refreshCurrentView();
  showToast('🔄 Ανανεώθηκε!');
}

function emptyRow(cols, msg) {
  return `<tr><td colspan="${cols}" style="text-align:center;padding:18px;color:var(--muted);">${msg}</td></tr>`;
}

// ============================================================
// SUPABASE HELPER
// ============================================================
function sbFetch(path, opts={}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: HDR, ...opts });
}
function enc(v) { return encodeURIComponent(v); }

// ============================================================
// UI HELPERS
// ============================================================
function noDataHtml(msg) {
  return `<div class="center-state">
    <div class="state-icon">⏳</div>
    <div class="state-title">Αναμονή</div>
    <div class="state-text">${msg}</div>
    <button class="no-results-btn" onclick="manualRefresh()">🔄 Ανανέωση</button>
  </div>`;
}
// v20: Όταν ο αγώνας δεν έχει παίξει live → έλεγχος cinema_played_at
function waitingDrawHtml() {
  return `<div class="center-state">
    <div class="state-icon">🔒</div>
    <div class="state-title">Περιμένετε τη Live Κλήρωση</div>
    <div class="state-text">
      Ο διοργανωτής δεν έχει ολοκληρώσει την παρουσίαση της κλήρωσης ακόμα.<br>
      Όλα τα αποτελέσματα θα γίνουν ορατά αμέσως μετά.
    </div>
    <button class="no-results-btn" onclick="manualRefresh()">🔄 Ανανέωση</button>
  </div>`;
}
function showLoading() {
  document.getElementById('mainContent').innerHTML = `<div class="center-state"><div class="spinner"></div><div class="state-text">Φόρτωση...</div></div>`;
}
function showNoRaces() {
  document.getElementById('mainContent').innerHTML = `<div class="center-state">
    <div class="state-icon">🎣</div>
    <div class="state-title">Δεν υπάρχουν αγώνες</div>
    <div class="state-text">Δεν βρέθηκαν ενεργοί αγώνες.</div>
    <button class="no-results-btn" onclick="loadRaces()">🔄 Δοκίμασε ξανά</button>
  </div>`;
}
function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="center-state">
    <div class="state-icon">⚠️</div>
    <div class="state-title">Σφάλμα</div>
    <div class="state-text">${msg}</div>
    <button class="no-results-btn" onclick="loadRaces()">🔄 Δοκίμασε ξανά</button>
  </div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
