<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐟 Kritis Results v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root {
  --navy:    #080f1e;
  --navy2:   #0d1b35;
  --navy3:   #142850;
  --blue:    #1565c0;
  --cyan:    #00c8e0;
  --cyan2:   #00e5ff;
  --gold:    #ffd600;
  --silver:  #b0bec5;
  --bronze:  #ff8f00;
  --green:   #00e676;
  --red:     #ff1744;
  --white:   #e8f4ff;
  --muted:   #7a9bbf;
  --card:    #0d1f3c;
  --border:  rgba(0,200,224,0.12);
  --border2: rgba(0,200,224,0.25);
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'IBM Plex Sans',sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(160deg, var(--navy3) 0%, var(--navy2) 100%);
  border-bottom: 1px solid var(--border2);
  padding: 12px 16px 8px;
  position: sticky; top:0; z-index:200;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

.header-row1 {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}

.app-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6em; letter-spacing:3px;
  color:var(--cyan); line-height:1;
}

.live-pill {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,23,68,0.15);
  border:1px solid rgba(255,23,68,0.4);
  border-radius:20px; padding:4px 11px;
  font-size:0.75em; font-weight:700; color:var(--red);
  white-space:nowrap; flex-shrink:0;
}
.live-dot {
  width:7px; height:7px; background:var(--red);
  border-radius:50%; animation:blink 1.3s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

/* ── RACE SELECTOR ── */
.race-selector {
  margin-top:8px;
  position:relative;
}

.race-select {
  width:100%;
  padding:10px 36px 10px 12px;
  background: rgba(0,200,224,0.08);
  border: 1px solid var(--border2);
  border-radius:10px;
  color:var(--white);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:0.85em; font-weight:600;
  appearance:none; cursor:pointer;
  outline:none;
}
.race-select option { background:var(--navy2); color:var(--white); }
.select-arrow {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  color:var(--cyan); pointer-events:none; font-size:0.9em;
}

.race-meta {
  display:flex; gap:8px; flex-wrap:wrap;
  margin-top:6px;
}
.meta-chip {
  font-size:0.7em; font-weight:600;
  background:rgba(0,200,224,0.1);
  border:1px solid var(--border);
  border-radius:8px; padding:2px 8px;
  color:var(--muted);
}
.meta-chip.gt {
  background:rgba(255,214,0,0.1);
  border-color:rgba(255,214,0,0.3);
  color:var(--gold);
}

/* ── NAV TABS ── */
.nav-tabs {
  display:flex; gap:4px; padding:10px 14px 0;
  overflow-x:auto; scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab {
  flex-shrink:0; padding:7px 16px;
  border:1px solid var(--border); border-bottom:none;
  background:transparent; color:var(--muted);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:0.82em; font-weight:700; letter-spacing:.5px;
  border-radius:8px 8px 0 0; cursor:pointer; transition:all .2s;
}
.nav-tab.active {
  background:var(--card); color:var(--cyan); border-color:var(--cyan);
}

/* ── MAIN ── */
.main { padding:12px 14px 100px; }

/* ── LOADING / EMPTY ── */
.center-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:50vh; gap:14px; text-align:center;
}
.state-icon { font-size:3em; }
.state-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6em; letter-spacing:3px; color:var(--cyan);
}
.state-text { font-size:0.85em; color:var(--muted); line-height:1.6; max-width:260px; }

.spinner {
  width:36px; height:36px;
  border:3px solid var(--border2);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PROGRESS ── */
.progress-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px;
  margin-bottom:12px;
  display:flex; align-items:center; gap:14px;
}
.progress-nums {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8em; color:var(--cyan); line-height:1; white-space:nowrap;
}
.progress-label { font-size:0.75em; color:var(--muted); margin-top:2px; }
.pbar-wrap {
  flex:1; height:6px;
  background:rgba(255,255,255,0.07);
  border-radius:99px; overflow:hidden;
}
.pbar-fill {
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  border-radius:99px; transition:width .6s ease;
}

/* ── SECTOR CHIPS ── */
.sector-strip {
  display:flex; gap:6px; overflow-x:auto;
  padding-bottom:10px; scrollbar-width:none; margin-bottom:10px;
}
.sector-strip::-webkit-scrollbar{display:none;}
.sector-chip {
  flex-shrink:0; padding:6px 14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; font-size:0.82em; font-weight:700;
  color:var(--muted); cursor:pointer; transition:all .2s; white-space:nowrap;
}
.sector-chip.active {
  background:var(--blue); border-color:var(--cyan);
  color:white; box-shadow:0 2px 12px rgba(0,200,224,0.2);
}

/* ── RESULTS CARD ── */
.results-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; margin-bottom:14px;
}
.results-card-hdr {
  padding:10px 14px;
  background:rgba(0,200,224,0.06);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.results-card-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.05em; letter-spacing:2px; color:var(--cyan);
}

/* ── TABLE ── */
.rtable { width:100%; border-collapse:collapse; font-size:.875em; }
.rtable thead th {
  background:rgba(0,200,224,0.07);
  color:var(--muted); font-size:.72em; font-weight:700;
  letter-spacing:.8px; text-transform:uppercase;
  padding:8px 10px; border-bottom:1px solid var(--border);
}
.rtable tbody tr {
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background .15s;
}
.rtable tbody tr:hover { background:rgba(0,200,224,0.04); }
.rtable tbody tr:last-child { border-bottom:none; }
.rtable td { padding:10px 10px; vertical-align:middle; }

/* Row highlights */
.rtable tbody tr.r1 { background:rgba(255,214,0,0.05); }
.rtable tbody tr.r2 { background:rgba(176,190,197,0.04); }
.rtable tbody tr.r3 { background:rgba(255,143,0,0.04); }

/* Rank cell */
.rank-cell {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.35em; text-align:center; width:38px; padding-right:4px;
}
.rk1 { color:var(--gold); }
.rk2 { color:var(--silver); }
.rk3 { color:var(--bronze); }
.rko { color:var(--muted); }

.athlete-name { font-weight:700; color:var(--white); font-size:.95em; }
.athlete-club { font-size:.72em; color:var(--muted); margin-top:1px; }

.score-val {
  font-family:'IBM Plex Mono',monospace;
  font-weight:600; font-size:.95em;
  color:var(--cyan); text-align:right; white-space:nowrap;
}
.score-unit { font-size:.7em; color:var(--muted); font-weight:400; }
.sub-score {
  font-size:.72em; color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
  text-align:right; white-space:nowrap;
}

/* Tied badge */
.tied {
  display:inline-block;
  background:rgba(255,214,0,0.15);
  border:1px solid rgba(255,214,0,0.3);
  color:var(--gold); font-size:.6em; padding:1px 5px;
  border-radius:4px; font-weight:700; margin-left:3px;
  vertical-align:middle;
}

/* Incomplete badge */
.inc-badge {
  display:inline-flex; align-items:center; gap:3px;
  background:rgba(255,214,0,0.1);
  border:1px solid rgba(255,214,0,0.25);
  color:var(--gold); font-size:.7em; padding:2px 8px;
  border-radius:6px; font-weight:600;
}
.done-badge {
  color:var(--green); font-size:.75em; font-weight:700;
}

/* ── NEW ROW ANIMATION ── */
@keyframes flashNew {
  0%   { background:rgba(0,230,118,0.25); }
  100% { background:transparent; }
}
.row-new { animation:flashNew 1.5s ease-out forwards; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--navy2); border:1px solid var(--cyan);
  color:var(--white); padding:10px 22px;
  border-radius:99px; font-size:.88em; font-weight:600;
  z-index:9999; opacity:0; transition:all .3s;
  pointer-events:none; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── FOOTER ── */
.footer { text-align:center; font-size:.7em; color:var(--muted); opacity:.4; margin-top:20px; }

/* ── NO RACES ── */
.no-races-btn {
  padding:14px 28px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:white; border:none; border-radius:12px;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:1em; font-weight:700; cursor:pointer;
  box-shadow:0 4px 20px rgba(0,200,224,0.25);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row1">
    <div>
      <div class="app-title">🐟 KRITIS RESULTS</div>
    </div>
    <div class="live-pill" id="livePill" style="display:none;">
      <div class="live-dot"></div>LIVE
    </div>
  </div>

  <!-- Race Selector -->
  <div class="race-selector" id="raceSelectorWrap" style="display:none;">
    <select class="race-select" id="raceSelect" onchange="onRaceChange()">
      <option value="">— Επιλογή Αγώνα —</option>
    </select>
    <div class="select-arrow">▾</div>
  </div>
  <div class="race-meta" id="raceMeta"></div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs" id="navTabs" style="display:none;">
  <button class="nav-tab active" id="tab-live" onclick="showView('live')">📡 Live</button>
  <button class="nav-tab" id="tab-overall" onclick="showView('overall')">🏆 Συνολική</button>
  <button class="nav-tab" id="tab-individual" onclick="showView('individual')">🥇 Ατομική</button>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="center-state" id="loadingState">
    <div class="spinner"></div>
    <div class="state-text">Φόρτωση αγώνων...</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==========================================
// CONFIG
// ==========================================
const SUPABASE_URL = 'https://lnknyxaozoyxxiqqaswi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxua255eGFvem95eHhpcXFhc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTMxMTYsImV4cCI6MjA4OTk2OTExNn0.MA86SoUGaPsaIxzEvLNnx9oCoewqTG0ivUEVTN9jAwQ';

const HDR = {
  'apikey':        SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type':  'application/json'
};

// ==========================================
// STATE
// ==========================================
let races        = [];
let currentRace  = null;
let measurements = [];   // για τον τρέχοντα αγώνα
let currentView  = 'live';
let currentSector= null;
let pollingTimer = null;

// ==========================================
// INIT
// ==========================================
async function init() {
  await loadRaces();
}

// ==========================================
// LOAD RACES
// ==========================================
async function loadRaces() {
  showLoading();
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/races?order=created_at.desc&limit=50`,
      { headers: HDR }
    );
    if (!res.ok) throw new Error(await res.text());
    races = await res.json();

    if (races.length === 0) {
      showNoRaces();
      return;
    }

    populateDropdown();
    // Auto-select πιο πρόσφατο
    await selectRace(races[0].id);

  } catch(e) {
    showError(e.message);
  }
}

function populateDropdown() {
  const sel = document.getElementById('raceSelect');
  sel.innerHTML = '<option value="">— Επιλογή Αγώνα —</option>';
  races.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = `${r.race_title} · ${r.race_location||''} · ${r.race_date||''} · Αγ.${r.round_number}`;
    sel.appendChild(opt);
  });
  document.getElementById('raceSelectorWrap').style.display = 'block';
}

async function onRaceChange() {
  const id = document.getElementById('raceSelect').value;
  if (!id) return;
  await selectRace(id);
}

async function selectRace(id) {
  currentRace = races.find(r => r.id === id) || races[0];
  document.getElementById('raceSelect').value = currentRace.id;

  // Meta chips
  const gt = currentRace.game_type === 'float' ? '🎣 Float' : '🎯 Casting';
  document.getElementById('raceMeta').innerHTML = `
    <span class="meta-chip gt">${gt}</span>
    <span class="meta-chip">📍 ${currentRace.race_location||'—'}</span>
    <span class="meta-chip">📅 ${currentRace.race_date||'—'}</span>
    <span class="meta-chip">Αγ. ${currentRace.round_number}</span>
  `;

  // Set default sector
  const sectors = currentRace.sectors || [];
  if (sectors.length > 0) currentSector = sectors[0].name;

  // Show UI
  document.getElementById('navTabs').style.display = 'flex';
  document.getElementById('livePill').style.display = 'flex';

  // Load measurements
  await loadMeasurements();

  // Start polling
  startPolling();

  showView(currentView);
}

// ==========================================
// LOAD MEASUREMENTS
// ==========================================
async function loadMeasurements() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/measurements?race_id=eq.${currentRace.id}&order=meas_num.asc`,
      { headers: HDR }
    );
    if (!res.ok) throw new Error(await res.text());
    measurements = await res.json();
  } catch(e) {
    console.warn('loadMeasurements error:', e);
    measurements = [];
  }
}

// ==========================================
// POLLING — κάθε 10 δευτερόλεπτα
// ==========================================
function startPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(async () => {
    if (!currentRace) return;
    const prevCount = measurements.length;
    const prevDone  = measurements.filter(m => m.completed).length;
    await loadMeasurements();
    const newDone = measurements.filter(m => m.completed).length;
    if (newDone !== prevDone || measurements.length !== prevCount) {
      renderCurrentView();
      showToast('📡 Νέα καταμέτρηση!');
    }
  }, 10000);
}

// ==========================================
// CALCULATIONS
// ==========================================
function calcSectorRankings(sectorName) {
  if (!currentRace) return [];
  const isFloat = currentRace.game_type === 'float';
  const sectorAthletes = (currentRace.athletes || []).filter(a => a.sector === sectorName);
  const sectorMeas = measurements.filter(m => m.sector === sectorName && m.completed);

  const totals = {};
  sectorAthletes.forEach(a => {
    totals[a.position] = {
      position:    a.position,
      lastname:    a.lastname  || '',
      firstname:   a.firstname || '',
      club:        a.club      || '',
      totalCm:     0, totalFish: 0, maxCatch: 0,
      totalWeight: 0, maxFish:   0, score: 0
    };
  });

  sectorMeas.forEach(m => {
    (m.athletes || []).forEach(a => {
      if (!totals[a.position]) return;
      if (isFloat) {
        totals[a.position].totalWeight += (a.totalWeight || 0);
        if ((a.maxFish||0) > totals[a.position].maxFish)
          totals[a.position].maxFish = a.maxFish || 0;
      } else {
        totals[a.position].totalCm   += (a.totalCm || 0);
        totals[a.position].totalFish += (a.fish ? a.fish.length : 0);
        const mx = a.fish?.length ? Math.max(...a.fish) : 0;
        if (mx > totals[a.position].maxCatch) totals[a.position].maxCatch = mx;
      }
    });
  });

  Object.values(totals).forEach(a => {
    a.score = isFloat ? a.totalWeight : a.totalCm + a.totalFish * 10;
  });

  const arr = Object.values(totals);
  if (isFloat) {
    arr.sort((a,b) => b.totalWeight !== a.totalWeight
      ? b.totalWeight - a.totalWeight : b.maxFish - a.maxFish);
  } else {
    arr.sort((a,b) => {
      if (b.score    !== a.score)     return b.score    - a.score;
      if (b.totalFish!== a.totalFish) return b.totalFish- a.totalFish;
      return b.maxCatch - a.maxCatch;
    });
  }

  return applyRanks(arr, isFloat);
}

function isTied(a, b, isFloat) {
  if (isFloat) return a.totalWeight===b.totalWeight && a.maxFish===b.maxFish;
  return a.score===b.score && a.totalFish===b.totalFish && a.maxCatch===b.maxCatch;
}

function applyRanks(arr, isFloat) {
  const out = []; let i = 0;
  while (i < arr.length) {
    let j = i+1;
    while (j < arr.length && isTied(arr[i], arr[j], isFloat)) j++;
    const pos = Array.from({length:j-i},(_,k)=>i+1+k);
    for (let k=i; k<j; k++) {
      const hasPoints = isFloat ? arr[k].totalWeight>0 : arr[k].totalFish>0;
      let rank = pos.length===1 ? pos[0]
        : hasPoints ? Math.floor(pos.reduce((s,p)=>s+p,0)/pos.length)
                    : Math.ceil (pos.reduce((s,p)=>s+p,0)/pos.length);
      out.push({...arr[k], rank, tied: pos.length>1});
    }
    i = j;
  }
  return out;
}

function getCompletedCount(sectorName) {
  return measurements.filter(m => m.sector===sectorName && m.completed).length;
}

function getTotalMeasurements() {
  // For casting: 10, for float: 1
  return currentRace?.game_type === 'float' ? 1 : 10;
}

function getGlobalProgress() {
  const sectors = currentRace?.sectors || [];
  let done=0, total=0;
  sectors.forEach(s => {
    done  += getCompletedCount(s.name);
    total += getTotalMeasurements();
  });
  return { done, total };
}


// ==========================================
// ΑΤΟΜΙΚΗ ΚΑΤΑΤΑΞΗ ΑΓΩΝΑ
// ==========================================
function getParticipationType(athlete) {
  // v1.2+: participationType field
  if (athlete.participationType) return athlete.participationType;
  // v1.1 fallback: omadiko boolean
  return athlete.omadiko ? 'AO' : 'A';
}

function calcIndividualRankings() {
  if (!currentRace) return [];
  const isFloat = currentRace.game_type === 'float';
  const sectors = currentRace.sectors || [];

  // Βήμα 1: Υπολόγισε κατάταξη ανά τομέα (μόνο A + AO)
  const allAthletes = [];

  sectors.forEach(s => {
    const rankings = calcSectorRankings(s.name);
    // Φιλτράρισμα: μόνο A και AO μετράνε στην ατομική
    const sectorAthletes = (currentRace.athletes || []).filter(a => a.sector === s.name);

    rankings.forEach(r => {
      // Βρες τον αθλητή στο raceData για participationType
      const raceAthlete = sectorAthletes.find(a => a.position === r.position);
      const ptype = raceAthlete ? getParticipationType(raceAthlete) : 'A';

      // Μόνο A και AO στην ατομική
      if (ptype === 'O') return;

      allAthletes.push({
        ...r,
        sector:          s.name,
        points:          r.rank,        // βαθμοί = θέση στον τομέα
        participationType: ptype
      });
    });
  });

  // Βήμα 2: Ταξινόμηση
  // 1ο: βαθμοί (λιγότεροι = καλύτεροι)
  // 2ο: σκορ (casting: totalCm+fish*10, float: totalWeight) — περισσότερο = καλύτερο
  // 3ο: πλήθος ψαριών (casting) / max ψάρι (float) — περισσότερο = καλύτερο
  allAthletes.sort((a, b) => {
    if (a.points !== b.points) return a.points - b.points;
    if (b.score  !== a.score)  return b.score  - a.score;
    if (isFloat) return b.maxFish    - a.maxFish;
    else         return b.totalFish  - a.totalFish;
  });

  // Βήμα 3: Απόδοση θέσεων με ισοβαθμία
  return applyIndividualRanks(allAthletes, isFloat);
}

function isIndividualTied(a, b, isFloat) {
  if (a.points !== b.points) return false;
  if (a.score  !== b.score)  return false;
  if (isFloat) return a.maxFish   === b.maxFish;
  else         return a.totalFish === b.totalFish;
}

function applyIndividualRanks(arr, isFloat) {
  const out = []; let i = 0;
  while (i < arr.length) {
    let j = i + 1;
    while (j < arr.length && isIndividualTied(arr[i], arr[j], isFloat)) j++;
    const pos = Array.from({length: j-i}, (_, k) => i+1+k);
    for (let k = i; k < j; k++) {
      const hasPoints = isFloat ? arr[k].totalWeight > 0 : arr[k].totalFish > 0;
      let rank = pos.length === 1 ? pos[0]
        : hasPoints ? Math.floor(pos.reduce((s,p) => s+p, 0) / pos.length)
                    : Math.ceil (pos.reduce((s,p) => s+p, 0) / pos.length);
      out.push({ ...arr[k], indRank: rank, indTied: pos.length > 1 });
    }
    i = j;
  }
  return out;
}

// ── RENDER ΑΤΟΜΙΚΗ ──
function renderIndividual() {
  const main    = document.getElementById('mainContent');
  const isFloat = currentRace.game_type === 'float';
  const rankings = calcIndividualRankings();

  let rows = '';
  if (rankings.length === 0) {
    rows = `<tr><td colspan="5" style="text-align:center;padding:18px;color:var(--muted);font-size:.85em;">Δεν υπάρχουν ακόμα καταμετρήσεις</td></tr>`;
  } else {
    rows = rankings.map(a => {
      const rkc   = a.indRank===1?'rk1':a.indRank===2?'rk2':a.indRank===3?'rk3':'rko';
      const medal = a.indRank===1?'🥇':a.indRank===2?'🥈':a.indRank===3?'🥉':a.indRank;
      const rowc  = a.indRank<=3 ? `r${a.indRank}` : '';
      const tiedBadge = a.indTied ? '<span class="tied">=</span>' : '';

      // Score display
      const scoreHtml = isFloat
        ? `<td class="score-val">${a.totalWeight}<span class="score-unit"> gr</span></td>`
        : `<td class="score-val">${a.score}<span class="score-unit"> pt</span></td>`;

      // Tiebreaker — εμφανίζεται μόνο αν υπάρχει ισοβαθμία στους βαθμούς
      const tbHtml = isFloat
        ? `<td class="sub-score">${a.maxFish > 0 ? a.maxFish+' gr' : '—'}</td>`
        : `<td class="sub-score" style="text-align:center;">${a.totalFish}</td>`;

      return `<tr class="${rowc}">
        <td class="rank-cell ${rkc}">${medal}${tiedBadge}</td>
        <td><div class="athlete-name">${a.lastname} ${a.firstname}</div>
            <div class="athlete-club">${a.club} · Τομ.${a.sector}</div></td>
        <td class="sub-score" style="text-align:center;color:var(--gold);">${a.points}</td>
        ${scoreHtml}
        ${tbHtml}
      </tr>`;
    }).join('');
  }

  const hdrScore = isFloat ? 'Βάρος' : 'Σκορ';
  const hdrTb    = isFloat ? 'Max'   : 'Ψάρια';

  main.innerHTML = `
    <div id="individualView">
      <div class="results-card">
        <div class="results-card-hdr">
          <span class="results-card-title">ΑΤΟΜΙΚΗ ΚΑΤΑΤΑΞΗ</span>
          <span class="meta-chip gt">${isFloat ? '🎣 Float' : '🎯 Casting'}</span>
        </div>
        <table class="rtable">
          <thead>
            <tr>
              <th style="width:38px;">#</th>
              <th>Αθλητής</th>
              <th style="text-align:center;color:var(--gold);">Βαθμοί</th>
              <th style="text-align:right;">${hdrScore}</th>
              <th style="text-align:right;">${hdrTb}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="footer">Kritis Results v3 · Ατομική Κατάταξη</div>
    </div>`;
}

// ==========================================
// VIEWS
// ==========================================
function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+view)?.classList.add('active');
  renderCurrentView();
}

function renderCurrentView(flashSector) {
  if (!currentRace) return;
  if (currentView==='live')       renderLive(flashSector);
  if (currentView==='overall')    renderOverall();
  if (currentView==='individual') renderIndividual();
}

// ── LIVE VIEW ──
function renderLive(flashSector) {
  const main   = document.getElementById('mainContent');
  const isFloat= currentRace.game_type === 'float';
  const sectors= currentRace.sectors || [];
  let html = '<div id="liveView">';

  // Progress (only for casting)
  if (!isFloat) {
    const prog = getGlobalProgress();
    const pct  = prog.total>0 ? Math.round(prog.done/prog.total*100) : 0;
    html += `
      <div class="progress-card">
        <div>
          <div class="progress-nums">${prog.done}/${prog.total}</div>
          <div class="progress-label">Καταμετρήσεις</div>
        </div>
        <div class="pbar-wrap">
          <div class="pbar-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }

  // Sector strip (if >1 sector)
  if (sectors.length > 1) {
    html += '<div class="sector-strip">';
    sectors.forEach(s => {
      const active = s.name===currentSector ? 'active' : '';
      const done   = getCompletedCount(s.name);
      const tot    = getTotalMeasurements();
      html += `<div class="sector-chip ${active}" onclick="selectSector('${s.name}')">${s.name} <span style="opacity:.7;font-size:.82em;">${done}/${tot}</span></div>`;
    });
    html += '</div>';
  }

  // Rankings for current sector
  const sName = currentSector || sectors[0]?.name;
  if (sName) {
    html += renderSectorTable(sName, flashSector === sName);
  }

  html += '<div class="footer">Kritis Results v3 · Live</div></div>';
  main.innerHTML = html;
}

// ── OVERALL VIEW ──
function renderOverall() {
  const main    = document.getElementById('mainContent');
  const sectors = currentRace.sectors || [];
  let html = '<div id="overallView">';

  sectors.forEach(s => {
    html += renderSectorTable(s.name, false, true);
  });

  html += '<div class="footer">Kritis Results v3</div></div>';
  main.innerHTML = html;
}

// ── SECTOR TABLE ──
function renderSectorTable(sName, flash=false, compact=false) {
  const isFloat  = currentRace.game_type === 'float';
  const rankings = calcSectorRankings(sName);
  const done     = getCompletedCount(sName);
  const tot      = getTotalMeasurements();

  const statusHtml = done < tot
    ? `<span class="inc-badge">⏳ ${done}/${tot}</span>`
    : `<span class="done-badge">✅ Ολοκλ.</span>`;

  let rows = '';
  if (rankings.length === 0) {
    rows = `<tr><td colspan="4" style="text-align:center;padding:18px;color:var(--muted);font-size:.85em;">Δεν υπάρχουν ακόμα καταμετρήσεις</td></tr>`;
  } else if (isFloat) {
    rows = rankings.map((a,i) => {
      const rkc   = a.rank===1?'rk1':a.rank===2?'rk2':a.rank===3?'rk3':'rko';
      const medal = a.rank===1?'🥇':a.rank===2?'🥈':a.rank===3?'🥉':a.rank;
      const rowc  = a.rank<=3?`r${a.rank}`:'';
      const newc  = flash && i===0 ? 'row-new' : '';
      return `<tr class="${rowc} ${newc}">
        <td class="rank-cell ${rkc}">${medal}${a.tied?'<span class="tied">=</span>':''}</td>
        <td><div class="athlete-name">${a.lastname} ${a.firstname}</div>${a.club?`<div class="athlete-club">${a.club}</div>`:''}</td>
        <td class="score-val">${a.totalWeight}<span class="score-unit"> gr</span></td>
        <td class="sub-score" style="color:${a.tied?'var(--cyan)':'var(--muted)'};">${a.maxFish>0?a.maxFish+' gr':'—'}</td>
      </tr>`;
    }).join('');
  } else {
    rows = rankings.map((a,i) => {
      const rkc   = a.rank===1?'rk1':a.rank===2?'rk2':a.rank===3?'rk3':'rko';
      const medal = a.rank===1?'🥇':a.rank===2?'🥈':a.rank===3?'🥉':a.rank;
      const rowc  = a.rank<=3?`r${a.rank}`:'';
      const newc  = flash && i===0 ? 'row-new' : '';
      // Show maxCatch only when tied
      const showMax = a.tied && a.maxCatch > 0;
      return `<tr class="${rowc} ${newc}">
        <td class="rank-cell ${rkc}">${medal}${a.tied?'<span class="tied">=</span>':''}</td>
        <td><div class="athlete-name">${a.lastname} ${a.firstname}</div>${a.club?`<div class="athlete-club">${a.club}</div>`:''}</td>
        <td class="sub-score" style="text-align:center;">${a.totalFish}${showMax?` <span style="color:var(--cyan);font-size:.7em;">max:${a.maxCatch}cm</span>`:''}</td>
        <td class="score-val">${a.score}<span class="score-unit"> pt</span></td>
      </tr>`;
    }).join('');
  }

  const hdrCols = isFloat
    ? `<th style="text-align:right;">Βάρος</th><th style="text-align:right;">Max</th>`
    : `<th style="text-align:center;">Ψάρια</th><th style="text-align:right;">Σκορ</th>`;

  return `
    <div class="results-card">
      <div class="results-card-hdr">
        <span class="results-card-title">ΤΟΜΕΑΣ ${sName}</span>
        ${statusHtml}
      </div>
      <table class="rtable">
        <thead><tr><th style="width:38px;">#</th><th>Αθλητής</th>${hdrCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function selectSector(name) {
  currentSector = name;
  renderLive();
  // Update chips
  document.querySelectorAll('.sector-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim().startsWith(name));
  });
}

// ==========================================
// UI STATES
// ==========================================
function showLoading() {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state">
      <div class="spinner"></div>
      <div class="state-text">Φόρτωση αγώνων...</div>
    </div>`;
}

function showNoRaces() {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state">
      <div class="state-icon">🎣</div>
      <div class="state-title">Κανένας Αγώνας</div>
      <div class="state-text">Δεν υπάρχουν ακόμα αγώνες στο σύστημα.<br>Ενεργοποίησε το Live Publishing στο MeasurementApp.</div>
      <button class="no-races-btn" onclick="loadRaces()">🔄 Ανανέωση</button>
    </div>`;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Σφάλμα</div>
      <div class="state-text">${msg}</div>
      <button class="no-races-btn" onclick="loadRaces()">🔄 Δοκίμασε ξανά</button>
    </div>`;
}

// ==========================================
// TOAST
// ==========================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ==========================================
// START
// ==========================================
init();
</script>
