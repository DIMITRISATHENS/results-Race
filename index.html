<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐟 SFM Live v10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root {
  --navy:    #080f1e;
  --navy2:   #0d1b35;
  --navy3:   #142850;
  --blue:    #1565c0;
  --cyan:    #00c8e0;
  --cyan2:   #00e5ff;
  --gold:    #ffd600;
  --silver:  #b0bec5;
  --bronze:  #ff8f00;
  --green:   #00e676;
  --red:     #ff1744;
  --white:   #e8f4ff;
  --muted:   #7a9bbf;
  --card:    #0d1f3c;
  --border:  rgba(0,200,224,0.12);
  --border2: rgba(0,200,224,0.25);
  --amber:   #f4a261;
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'IBM Plex Sans',sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(160deg, var(--navy3) 0%, var(--navy2) 100%);
  border-bottom: 1px solid var(--border2);
  padding: 12px 16px 8px;
  position: sticky; top:0; z-index:200;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.header-row1 {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.app-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5em; letter-spacing:3px;
  color:var(--cyan); line-height:1;
}
.app-subtitle {
  font-size:.7em; color:var(--muted); margin-top:1px; letter-spacing:1px;
}
.live-pill {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,23,68,0.15);
  border:1px solid rgba(255,23,68,0.4);
  border-radius:20px; padding:4px 11px;
  font-size:0.75em; font-weight:700; color:var(--red);
  white-space:nowrap; flex-shrink:0;
}
.live-dot {
  width:7px; height:7px; background:var(--red);
  border-radius:50%; animation:blink 1.3s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

/* ── RACE SELECTOR ── */
.race-selector { margin-top:8px; position:relative; }
.race-select {
  width:100%; padding:10px 36px 10px 12px;
  background: rgba(0,200,224,0.08);
  border: 1px solid var(--border2);
  border-radius:10px; color:var(--white);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:0.85em; font-weight:600;
  appearance:none; cursor:pointer; outline:none;
}
.race-select option { background:var(--navy2); color:var(--white); }
.select-arrow {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  color:var(--cyan); pointer-events:none; font-size:0.9em;
}
.race-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.meta-chip {
  font-size:.7em; font-weight:600;
  background:rgba(0,200,224,0.1);
  border:1px solid var(--border);
  border-radius:8px; padding:2px 8px; color:var(--muted);
}
.meta-chip.gt { background:rgba(255,214,0,0.1); border-color:rgba(255,214,0,0.3); color:var(--gold); }

/* ── NAV TABS ── */
.nav-tabs {
  display:flex; gap:0; padding:0;
  background:var(--navy2);
  border-bottom:1px solid var(--border2);
}
.nav-tab {
  flex:1; padding:11px 6px;
  border:none; border-bottom:3px solid transparent;
  background:transparent; color:var(--muted);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:.78em; font-weight:700; letter-spacing:.3px;
  cursor:pointer; transition:all .2s; text-align:center;
}
.nav-tab.active { color:var(--cyan); border-bottom-color:var(--cyan); }

/* ── MAIN ── */
.main { padding:12px 14px 100px; }

/* ── LOADING / EMPTY ── */
.center-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:50vh; gap:14px; text-align:center;
}
.state-icon { font-size:3em; }
.state-title { font-family:'Bebas Neue',sans-serif; font-size:1.6em; letter-spacing:3px; color:var(--cyan); }
.state-text { font-size:0.85em; color:var(--muted); line-height:1.6; max-width:260px; }
.spinner {
  width:36px; height:36px;
  border:3px solid var(--border2); border-top-color:var(--cyan);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH BAR ── */
.search-wrap {
  position:relative; margin-bottom:12px;
}
.search-input {
  width:100%; padding:10px 14px 10px 38px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:10px; color:var(--white);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:.9em; outline:none;
  transition:border-color .2s;
}
.search-input:focus { border-color:var(--cyan); }
.search-input::placeholder { color:var(--muted); }
.search-icon {
  position:absolute; left:12px; top:50%;
  transform:translateY(-50%); color:var(--muted); font-size:1em;
}
.search-result-highlight {
  background:rgba(0,200,224,0.12) !important;
  border-left:3px solid var(--cyan) !important;
}

/* ── SECTOR CARD (ΚΛΗΡΩΣΗ) ── */
.sector-block {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; margin-bottom:14px;
}
.sector-block-hdr {
  padding:10px 14px;
  background:linear-gradient(90deg,rgba(0,200,224,0.12),transparent);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sector-block-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1em; letter-spacing:2px; color:var(--cyan);
}
.sector-block-sub {
  font-size:.72em; color:var(--muted);
}

/* ── DRAW TABLE ── */
.draw-table { width:100%; border-collapse:collapse; font-size:.82em; }
.draw-table thead th {
  background:rgba(0,200,224,0.06);
  color:var(--muted); font-size:.68em; font-weight:700;
  letter-spacing:.8px; text-transform:uppercase;
  padding:5px 8px; border-bottom:1px solid var(--border);
  text-align:left;
}
.draw-table thead th.center { text-align:center; }
.draw-table tbody tr {
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background .15s;
}
.draw-table tbody tr:last-child { border-bottom:none; }
.draw-table tbody tr:hover { background:rgba(0,200,224,0.04); }
.draw-table td { padding:7px 8px; vertical-align:middle; }
.pos-cell {
  font-family:'IBM Plex Mono',monospace;
  font-weight:700; font-size:.9em;
  color:var(--cyan); text-align:center; width:36px;
}
.athlete-name { font-weight:700; color:var(--white); font-size:.85em; line-height:1.3; }
.athlete-club { font-size:.72em; color:var(--muted); margin-top:1px; }
.athlete-sponsor { font-size:.7em; color:var(--amber); margin-top:1px; }
.ptype-badge {
  display:inline-block; padding:0px 4px; border-radius:3px;
  font-size:.65em; font-weight:700; margin-left:3px; vertical-align:middle;
}
.ptype-AO { background:rgba(255,214,0,0.18); color:var(--gold); }
.ptype-A  { background:rgba(0,200,224,0.18); color:var(--cyan); }
.ptype-O  { background:rgba(0,230,118,0.18); color:var(--green); }

/* ── PROGRESS CARD ── */
.progress-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:12px 14px; margin-bottom:12px;
  display:flex; align-items:center; gap:14px;
}
.progress-nums { font-family:'Bebas Neue',sans-serif; font-size:1.8em; color:var(--cyan); line-height:1; white-space:nowrap; }
.progress-label { font-size:.75em; color:var(--muted); margin-top:2px; }
.pbar-wrap { flex:1; height:6px; background:rgba(255,255,255,0.07); border-radius:99px; overflow:hidden; }
.pbar-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--cyan)); border-radius:99px; transition:width .6s ease; }

/* ── SECTOR STRIP ── */
.sector-strip { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none; margin-bottom:10px; }
.sector-strip::-webkit-scrollbar{display:none;}
.sector-chip {
  flex-shrink:0; padding:6px 14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; font-size:.82em; font-weight:700;
  color:var(--muted); cursor:pointer; transition:all .2s; white-space:nowrap;
}
.sector-chip.active { background:var(--blue); border-color:var(--cyan); color:white; }

/* ── RESULTS CARD ── */
.results-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; }
.results-card-hdr {
  padding:10px 14px;
  background:rgba(0,200,224,0.06); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.results-card-title { font-family:'Bebas Neue',sans-serif; font-size:1.05em; letter-spacing:2px; color:var(--cyan); }

/* ── TABLE (LIVE/RESULTS) ── */
.rtable { width:100%; border-collapse:collapse; font-size:.875em; }
.rtable thead th {
  background:rgba(0,200,224,0.07); color:var(--muted); font-size:.72em; font-weight:700;
  letter-spacing:.8px; text-transform:uppercase; padding:6px 8px; border-bottom:1px solid var(--border);
}
.rtable tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background .15s; }
.rtable tbody tr:hover { background:rgba(0,200,224,0.04); }
.rtable tbody tr:last-child { border-bottom:none; }
.rtable td { padding:6px 8px; vertical-align:middle; }
.rtable tbody tr.r1 { background:rgba(255,214,0,0.05); }
.rtable tbody tr.r2 { background:rgba(176,190,197,0.04); }
.rtable tbody tr.r3 { background:rgba(255,143,0,0.04); }

.rank-cell { font-family:'Bebas Neue',sans-serif; font-size:1.35em; text-align:center; width:38px; }
.rk1{color:var(--gold);} .rk2{color:var(--silver);} .rk3{color:var(--bronze);} .rko{color:var(--muted);}

.score-val { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:.95em; color:var(--cyan); text-align:right; white-space:nowrap; }
.score-unit { font-size:.7em; color:var(--muted); font-weight:400; }
.sub-score { font-size:.72em; color:var(--muted); font-family:'IBM Plex Mono',monospace; text-align:right; white-space:nowrap; }
.tied { display:inline-block; background:rgba(255,214,0,0.15); border:1px solid rgba(255,214,0,0.3); color:var(--gold); font-size:.6em; padding:1px 5px; border-radius:4px; font-weight:700; margin-left:3px; vertical-align:middle; }
.inc-badge { display:inline-flex; align-items:center; gap:3px; background:rgba(255,214,0,0.1); border:1px solid rgba(255,214,0,0.25); color:var(--gold); font-size:.7em; padding:2px 8px; border-radius:6px; font-weight:600; }
.done-badge { color:var(--green); font-size:.75em; font-weight:700; }
.overall-table-wrap { overflow-x:auto; }
.overall-table-wrap .rtable { min-width:400px; }
@keyframes flashNew { 0%{background:rgba(0,230,118,0.25);} 100%{background:transparent;} }
.row-new { animation:flashNew 1.5s ease-out forwards; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--navy2); border:1px solid var(--cyan);
  color:var(--white); padding:10px 22px;
  border-radius:99px; font-size:.88em; font-weight:600;
  z-index:9999; opacity:0; transition:all .3s;
  pointer-events:none; white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.footer { text-align:center; font-size:.7em; color:var(--muted); opacity:.4; margin-top:20px; }
.no-races-btn {
  padding:14px 28px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:white; border:none; border-radius:12px;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:1em; font-weight:700; cursor:pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row1">
    <div>
      <div class="app-title">🐟 SFM LIVE</div>
      <div class="app-subtitle">SPORT FISHING MANAGER</div>
    </div>
    <div class="live-pill" id="livePill" style="display:none;">
      <div class="live-dot"></div>LIVE
    </div>
  </div>
  <div class="race-selector" id="raceSelectorWrap" style="display:none;">
    <select class="race-select" id="raceSelect" onchange="onRaceChange()">
      <option value="">— Επιλογή Αγώνα —</option>
    </select>
    <div class="select-arrow">▾</div>
  </div>
  <div class="race-meta" id="raceMeta"></div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs" id="navTabs" style="display:none;">
  <button class="nav-tab active" id="tab-draw"         onclick="showView('draw')">🎯 Κλήρωση</button>
  <button class="nav-tab"        id="tab-live"         onclick="showView('live')">📡 Live</button>
  <button class="nav-tab"        id="tab-individual"   onclick="showView('individual')">🥇 Ατομική</button>
  <button class="nav-tab"        id="tab-team"         onclick="showView('team')">🏅 Ομαδική</button>
  <button class="nav-tab"        id="tab-championship" onclick="showView('championship')" style="background:linear-gradient(135deg,rgba(255,214,0,.15),rgba(255,143,0,.1));border-color:rgba(255,214,0,.4);color:var(--gold);">🏆 Πρωτάθλημα</button>
</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <div class="center-state" id="loadingState">
    <div class="spinner"></div>
    <div class="state-text">Φόρτωση αγώνων...</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ==========================================
// CONFIG
// ==========================================
const SUPABASE_URL = 'https://lnknyxaozoyxxiqqaswi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxua255eGFvem95eHhpcXFhc3dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTMxMTYsImV4cCI6MjA4OTk2OTExNn0.MA86SoUGaPsaIxzEvLNnx9oCoewqTG0ivUEVTN9jAwQ';
const HDR = {
  'apikey':        SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type':  'application/json'
};

// ==========================================
// STATE
// ==========================================
let races        = [];
let currentRace  = null;
let measurements = [];
let currentView  = 'draw';
let currentSector= null;
let pollingTimer = null;
// Championship state
let champRaces        = [];   // όλοι οι αγώνες του πρωταθλήματος
let champMeasurements = {};   // { race_id: [measurements] }
let champLoaded       = false;

// ==========================================
// INIT
// ==========================================
async function init() { await loadRaces(); }

// ==========================================
// LOAD RACES
// ==========================================
async function loadRaces() {
  showLoading();
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/races?is_active=eq.true&order=created_at.desc&limit=50`,
      { headers: HDR }
    );
    if (!res.ok) throw new Error(await res.text());
    races = await res.json();
    if (races.length === 0) { showNoRaces(); return; }
    populateDropdown();
    await selectRace(races[0].id);
  } catch(e) { showError(e.message); }
}

function populateDropdown() {
  const sel = document.getElementById('raceSelect');
  sel.innerHTML = '<option value="">— Επιλογή Αγώνα —</option>';
  races.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = `${r.race_title||r.race_code} · ${r.race_location||''} · Αγ.${r.round_number}`;
    sel.appendChild(opt);
  });
  document.getElementById('raceSelectorWrap').style.display = 'block';
}

async function onRaceChange() {
  const id = parseInt(document.getElementById('raceSelect').value);
  if (!id) return;
  await selectRace(id);
}

async function selectRace(id) {
  currentRace = races.find(r => r.id === id) || races[0];
  document.getElementById('raceSelect').value = currentRace.id;

  const gt = currentRace.game_type === 'float' ? '🎣 Float' : '🎯 Casting';
  const rm = currentRace.rank_mode || currentRace.rankMode || 'split';
  const rmLabel = rm==='unified'?'Ενιαία':rm==='separate'?'Ξεχωριστή':'Διαχωρισμένη';
  document.getElementById('raceMeta').innerHTML = `
    <span class="meta-chip gt">${gt}</span>
    <span class="meta-chip">📍 ${currentRace.race_location||'—'}</span>
    <span class="meta-chip">📅 ${currentRace.race_date||'—'}</span>
    <span class="meta-chip">Αγ. ${currentRace.round_number}</span>
    <span class="meta-chip">📊 ${rmLabel}</span>
  `;

  const sectors = currentRace.sectors || [];
  if (sectors.length > 0) currentSector = sectors[0].name;

  document.getElementById('navTabs').style.display = 'flex';
  document.getElementById('livePill').style.display = 'flex';

  await loadMeasurements();
  startPolling();
  showView('draw');
}

// ==========================================
// LOAD MEASUREMENTS
// ==========================================
async function loadMeasurements() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/measurements?race_id=eq.${currentRace.id}&order=meas_num.asc`,
      { headers: HDR }
    );
    if (!res.ok) throw new Error(await res.text());
    measurements = await res.json();
  } catch(e) { console.warn('loadMeasurements error:', e); measurements = []; }
}

// ==========================================
// POLLING — κάθε 10 δευτερόλεπτα
// ==========================================
function startPolling() {
  if (pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(async () => {
    if (!currentRace) return;
    const prevDone = measurements.filter(m => m.completed).length;
    await loadMeasurements();
    const newDone = measurements.filter(m => m.completed).length;
    if (newDone !== prevDone || measurements.length !== (measurements.length)) {
      if (currentView !== 'draw') renderCurrentView();
      showToast('📡 Νέα καταμέτρηση!');
    }
  }, 10000);
}

// ==========================================
// VIEWS
// ==========================================
function showView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + view)?.classList.add('active');
  renderCurrentView();
}

function renderCurrentView(flashSector) {
  if (!currentRace) return;
  if (currentView === 'draw')         renderDraw();
  if (currentView === 'live')         renderLive(flashSector);
  if (currentView === 'individual')   renderIndividual();
  if (currentView === 'team')         renderTeam();
  if (currentView === 'championship') renderChampionship();
}

// ==========================================
// 🎯 ΚΛΗΡΩΣΗ VIEW
// ==========================================
function renderDraw() {
  const main    = document.getElementById('mainContent');
  const athletes = currentRace.athletes || [];
  const sectors  = currentRace.sectors  || [];

  if (athletes.length === 0) {
    main.innerHTML = `<div class="center-state">
      <div class="state-icon">🎯</div>
      <div class="state-title">Δεν υπάρχει κλήρωση</div>
      <div class="state-text">Η κλήρωση δεν έχει δημοσιευτεί ακόμα.</div>
    </div>`;
    return;
  }

  let html = '<div id="drawView">';

  // Search bar
  html += `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="drawSearch" type="text"
        placeholder="Αναζήτηση αθλητή..."
        oninput="filterDraw(this.value)"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>`;

  // Ανά τομέα
  sectors.forEach(s => {
    const sAthletes = athletes
      .filter(a => a.sector === s.name)
      .sort((a, b) => a.position - b.position);

    html += `
      <div class="sector-block" data-sector="${s.name}">
        <div class="sector-block-hdr">
          <span class="sector-block-title">ΤΟΜΕΑΣ ${s.name}</span>
          <span class="sector-block-sub">Θέσεις ${s.pegStart}–${s.pegEnd}</span>
        </div>
        <table class="draw-table">
          <thead>
            <tr>
              <th class="center">ΘΕΣΗ</th>
              <th>ΑΘΛΗΤΗΣ</th>
              <th>ΣΥΛΛΟΓΟΣ</th>
            </tr>
          </thead>
          <tbody>`;

    sAthletes.forEach(a => {
      const pt = a.participationType || (a.omadiko ? 'AO' : 'A');
      const sp = a.sponsor ? `<div class="athlete-sponsor">🏷 ${a.sponsor}</div>` : '';
      html += `
        <tr class="draw-row" data-name="${(a.lastname+' '+a.firstname).toLowerCase()}">
          <td class="pos-cell">${a.position}</td>
          <td>
            <div class="athlete-name">
              ${a.lastname} ${a.firstname}
              <span class="ptype-badge ptype-${pt}">${pt}</span>
            </div>
            ${sp}
          </td>
          <td>

  html += `<div class="footer">SFM Live v8 · Κλήρωση</div></div>`;

function filterDraw(query) {
  const q = query.toLowerCase().trim();
  const rows = document.querySelectorAll('.draw-row');
  const blocks = document.querySelectorAll('.sector-block');

  rows.forEach(row => {
    const name = row.dataset.name || '';
    const match = !q || name.includes(q);
    row.style.display = match ? '' : 'none';
    if (match && q) {
      row.classList.add('search-result-highlight');
    } else {
      row.classList.remove('search-result-highlight');
    }
  });

  // Κρύβε τομείς χωρίς αποτελέσματα
  blocks.forEach(block => {
    if (!q) { block.style.display = ''; return; }
    const visible = block.querySelectorAll('.draw-row:not([style*="display: none"])').length;
    block.style.display = visible > 0 ? '' : 'none';
  });
}

function getPType(a) {
  if (a.participationType) return a.participationType;
  return a.omadiko ? 'AO' : 'A';
}
function isAtomikos(a) { const t=getPType(a); return t==='A'||t==='AO'; }
function isOmadikos(a) { const t=getPType(a); return t==='O'||t==='AO'; }
function getRankMode()  { return currentRace?.rank_mode || currentRace?.rankMode || 'split'; }
function isTwoListMode(){ return getRankMode()!=='unified' && hasOmadikoi(); }
function hasOmadikoi()  { return (currentRace?.athletes||[]).some(a => isOmadikos(a)); }
function teamFilter(a) {
  const rm = getRankMode();
  if (rm==='separate') return isOmadikos(a);
  if (rm==='split')    return getPType(a)==='AO';
  return true;
}

function athleteScore(a, isFloat) {
  if (isFloat) return { total: a.totalWeight||0, maxFish: a.maxFish||0 };
  const total = (a.totalCm||0) + (a.totalFish||0)*10;
  return { total, maxFish: a.maxCatch||0 };
}

function athleteCell(a) {
  const pt = getPType(a);
  const sp = a.sponsor || '';
  return `<div class="athlete-name">${a.lastname} ${a.firstname}<span class="ptype-badge ptype-${pt}">${pt}</span></div>
          <div class="athlete-club">${a.club||''}</div>
          ${sp ? `<div class="athlete-sponsor">${sp}</div>` : ''}`;
}

// ==========================================
// SCORE CALCULATIONS (από v6)
// ==========================================
function buildSectorScores(sectorName) {
  const isFloat = currentRace.game_type === 'float';
  const sectorAthletes = (currentRace.athletes||[]).filter(a => a.sector===sectorName);
  const sectorMeas = measurements.filter(m => m.sector===sectorName && m.completed);

  const totals = {};
  sectorAthletes.forEach(a => {
    totals[a.position] = {
      position: a.position, id: a.id,
      lastname: a.lastname||'', firstname: a.firstname||'',
      club: a.club||'', sponsor: a.sponsor||'',
      participationType: getPType(a), omadiko: a.omadiko||false,
      totalCm:0, totalFish:0, maxCatch:0, totalWeight:0, maxFish:0
    };
  });

  sectorMeas.forEach(m => {
    (m.athletes||[]).forEach(a => {
      if (!totals[a.position]) return;
      if (isFloat) {
        totals[a.position].totalWeight += (a.totalWeight||0);
        if ((a.maxFish||0) > totals[a.position].maxFish) totals[a.position].maxFish = a.maxFish||0;
      } else {
        totals[a.position].totalCm   += (a.totalCm||0);
        totals[a.position].totalFish += (a.fish ? a.fish.length : 0);
        const mx = a.fish?.length ? Math.max(...a.fish) : 0;
        if (mx > totals[a.position].maxCatch) totals[a.position].maxCatch = mx;
      }
    });
  });

  Object.values(totals).forEach(a => {
    a.score = isFloat ? a.totalWeight : a.totalCm + a.totalFish*10;
  });
  return totals;
}

function applyRankList(arr, isFloat) {
  const out=[]; let i=0;
  while (i<arr.length) {
    let j=i+1;
    while (j<arr.length &&
      Math.abs(arr[j].total-arr[i].total)<0.001 &&
      Math.abs((arr[j].maxFish||0)-(arr[i].maxFish||0))<0.001) j++;
    const cnt=j-i;
    const hasScore = arr[i].total>0;
    let sum=0; for(let k=0;k<cnt;k++) sum+=i+1+k;
    const rank = cnt===1 ? i+1 : hasScore ? Math.floor(sum/cnt) : Math.ceil(sum/cnt);
    for(let k=i;k<j;k++) out.push({...arr[k], rank, tied:cnt>1});
    i=j;
  }
  return out;
}

function calcSectorRankings(sectorName) {
  if (!currentRace) return [];
  const isFloat  = currentRace.game_type === 'float';
  const twoList  = isTwoListMode();
  const scores   = buildSectorScores(sectorName);
  let realAthletes = Object.values(scores);

  // Ο τύπος O (μόνο ομαδικός) ΠΟΤΕ δεν μπαίνει στην ατομική κατάταξη τομέα
  let listAtomiki = realAthletes.filter(a => isAtomikos(a));
  listAtomiki = listAtomiki.map(a => ({...a, ...athleteScore(a, isFloat)}));
  listAtomiki.sort((x,y) => {
    if (Math.abs(y.total-x.total)>0.001) return y.total-x.total;
    return (y.maxFish||0)-(x.maxFish||0);
  });
  const rankedAtomiki = applyRankList(listAtomiki, isFloat);
  rankedAtomiki.forEach(e => { const r=scores[e.position]; if(r) r.sectorRank=e.rank; });

  // Ομαδική: φιλτράρει πάντα με teamFilter (O + AO για separate, μόνο AO για split)
  if (getRankMode() !== 'unified') {
    let listTeam = realAthletes.filter(a => teamFilter(a));
    listTeam = listTeam.map(a => ({...a, ...athleteScore(a, isFloat)}));
    listTeam.sort((x,y) => {
      if (Math.abs(y.total-x.total)>0.001) return y.total-x.total;
      return (y.maxFish||0)-(x.maxFish||0);
    });
    applyRankList(listTeam, isFloat).forEach(e => { const r=scores[e.position]; if(r) r.sectorRankTeam=e.rank; });
    Object.values(scores).forEach(a => { if(!teamFilter(a)) a.sectorRankTeam=null; });
  } else {
    // unified: ατομική = ομαδική
    Object.values(scores).forEach(a => { a.sectorRankTeam=a.sectorRank; });
  }

  const result = Object.values(scores);
  result._borrowed = [];
  return result;
}

function getCompletedCount(sectorName) {
  return measurements.filter(m => m.sector===sectorName && m.completed).length;
}
function getTotalMeasurements() {
  return currentRace?.game_type === 'float' ? 1 : 10;
}
function getGlobalProgress() {
  const sectors = currentRace?.sectors || [];
  let done=0, total=0;
  sectors.forEach(s => { done+=getCompletedCount(s.name); total+=getTotalMeasurements(); });
  return { done, total };
}

function calcIndividualRankings() {
  if (!currentRace) return [];
  const isFloat  = currentRace.game_type === 'float';
  const twoList  = isTwoListMode();
  const sectors  = currentRace.sectors || [];
  const allAthletes = [];

  sectors.forEach(s => {
    calcSectorRankings(s.name).forEach(r => {
      const ptype = getPType(r);
      if (twoList && ptype==='O') return;
      allAthletes.push({...r, sector:s.name, points:r.sectorRank, participationType:ptype});
    });
  });

  allAthletes.sort((a,b) => {
    if (a.points!==b.points) return a.points-b.points;
    const sA=isFloat?(a.totalWeight||0):(a.totalCm||0)+(a.totalFish||0)*10;
    const sB=isFloat?(b.totalWeight||0):(b.totalCm||0)+(b.totalFish||0)*10;
    if (sB!==sA) return sB-sA;
    return isFloat?(b.maxFish||0)-(a.maxFish||0):(b.maxCatch||0)-(a.maxCatch||0);
  });

  const out=[]; let i=0;
  while (i<allAthletes.length) {
    let j=i+1;
    const a=allAthletes[i];
    while (j<allAthletes.length) {
      const b=allAthletes[j];
      const sA=isFloat?(a.totalWeight||0):(a.totalCm||0)+(a.totalFish||0)*10;
      const sB=isFloat?(b.totalWeight||0):(b.totalCm||0)+(b.totalFish||0)*10;
      if (a.points!==b.points||sA!==sB) break;
      j++;
    }
    const pos=Array.from({length:j-i},(_,k)=>i+1+k);
    for(let k=i;k<j;k++){
      const hasPoints=isFloat?allAthletes[k].totalWeight>0:allAthletes[k].totalFish>0;
      let rank=pos.length===1?pos[0]:hasPoints?Math.floor(pos.reduce((s,p)=>s+p,0)/pos.length):Math.ceil(pos.reduce((s,p)=>s+p,0)/pos.length);
      out.push({...allAthletes[k],indRank:rank,indTied:pos.length>1});
    }
    i=j;
  }
  return out;
}

// ==========================================
// 🏅 ΟΜΑΔΙΚΗ
// ==========================================
function calcTeamRanking() {
  if (!currentRace) return [];
  const isFloat   = currentRace.game_type === 'float';
  const twoList   = isTwoListMode();
  const sectors   = currentRace.sectors || [];
  const dropWorst = parseInt(currentRace.drop_worst ?? currentRace.dropWorst ?? 1);
  const pegsPerSector = currentRace.pegs_per_sector || currentRace.pegsPerSector || 5;
  const penaltyRank   = pegsPerSector + 1;
  const clubMap = {};

  sectors.forEach(s => {
    calcSectorRankings(s.name).forEach(a => {
      if (!teamFilter(a)) return;
      const club = a.club || '(Χωρίς Σύλλογο)';
      if (!clubMap[club]) clubMap[club] = [];
      clubMap[club].push({
        ...a, sectorName:s.name,
        _rankForTeam: twoList?(a.sectorRankTeam??penaltyRank):(a.sectorRank??penaltyRank),
        _score: isFloat?(a.totalWeight||0):(a.totalCm||0)+(a.totalFish||0)*10
      });
    });
  });

  if (!Object.keys(clubMap).length) return [];

  const teams = Object.entries(clubMap).map(([club, members]) => {
    const sorted = [...members].sort((a,b) => b._rankForTeam-a._rankForTeam||a._score-b._score);
    const canDrop = members.length >= sectors.length;
    const effDrop = canDrop ? dropWorst : 0;
    const dropped  = effDrop>0 ? sorted.slice(0,effDrop) : [];
    const counting = effDrop>0 ? sorted.slice(effDrop) : sorted;
    const teamScore = counting.reduce((s,a)=>s+a._rankForTeam,0);
    const teamTotal = counting.reduce((s,a)=>s+a._score,0);
    return { club, members, counting, dropped, teamScore, teamTotal, canDrop };
  });

  teams.sort((a,b) => a.teamScore!==b.teamScore?a.teamScore-b.teamScore:b.teamTotal-a.teamTotal);
  let pos=1,i=0;
  while(i<teams.length){
    let j=i;
    while(j<teams.length&&teams[j].teamScore===teams[i].teamScore&&Math.abs(teams[j].teamTotal-teams[i].teamTotal)<0.001) j++;
    const cnt=j-i; let sum=0; for(let k=0;k<cnt;k++) sum+=pos+k;
    const rank=cnt===1?pos:Math.floor(sum/cnt);
    for(let k=i;k<j;k++) teams[k].teamRank=rank;
    pos+=cnt; i=j;
  }
  return teams;
}

  const hdrCols = isFloat
    ? `<th style="text-align:right;">Βάρος</th><th style="text-align:right;">Max</th><th style="text-align:center;color:var(--cyan);">Κατ.Ατ.</th>${twoList?'<th style="text-align:center;color:var(--green);">Κατ.Ομ.</th>':''}`
    : `<th style="text-align:center;">🐟</th><th style="text-align:right;">Σ(cm)</th><th style="text-align:right;">Σύνολο</th><th style="text-align:center;color:var(--cyan);">Κατ.Ατ.</th>${twoList?'<th style="text-align:center;color:var(--green);">Κατ.Ομ.</th>':''}`;

  return `<div class="results-card">
    <div class="results-card-hdr">
      <span class="results-card-title">ΤΟΜΕΑΣ ${sName}</span>
      ${statusHtml}
    </div>
    <div class="overall-table-wrap">
      <table class="rtable">
        <thead><tr><th style="width:36px;">ΘΕΣΗ</th><th>ΑΘΛΗΤΗΣ</th>${hdrCols}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function selectSector(name) {
  currentSector = name;
  renderLive();
}

// ==========================================
// UI STATES
// ==========================================
function showLoading() {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state"><div class="spinner"></div><div class="state-text">Φόρτωση αγώνων...</div></div>`;
}
function showNoRaces() {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state">
      <div class="state-icon">🎣</div>
      <div class="state-title">Κανένας Αγώνας</div>
      <div class="state-text">Δεν υπάρχουν ακόμα δημοσιευμένοι αγώνες.</div>
      <button class="no-races-btn" onclick="loadRaces()">🔄 Ανανέωση</button>
    </div>`;
}
function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="center-state">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Σφάλμα</div>
      <div class="state-text">${msg}</div>
      <button class="no-races-btn" onclick="loadRaces()">🔄 Δοκίμασε ξανά</button>
    </div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ==========================================
// START
// ==========================================
init();

// ==========================================
// 🏆 ΠΡΩΤΑΘΛΗΜΑ — Championship View
// ==========================================

let champData = null; // cached championship result

async function loadChampionshipData() {
  const champId = currentRace?.championship_id;
  if (!champId) return false;

  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="center-state"><div class="spinner"></div><div class="state-text">Φόρτωση πρωταθλήματος...</div></div>`;

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/championship_results?championship_id=eq.${encodeURIComponent(champId)}&order=published_at.desc&limit=1`,
      { headers: HDR }
    );
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    if (!rows.length) { champData = null; return false; }
    champData = rows[0];
    return true;
  } catch(e) {
    console.error('Championship load error:', e);
    champData = null;
    return false;
  }
}

async function renderChampionship() {
  const main = document.getElementById('mainContent');

  const ok = await loadChampionshipData();
  if (!ok) {
    main.innerHTML = `<div class="center-state">
      <div class="state-text" style="color:var(--muted);text-align:center;padding:20px;">
        ${currentRace?.championship_id
          ? '⚠️ Δεν υπάρχουν δημοσιευμένα αποτελέσματα πρωταθλήματος ακόμα.<br><small style="font-size:.8em;color:var(--muted);">Χρησιμοποιήστε το κουμπί 📤 Δημοσίευση στο SFM.</small>'
          : '⚠️ Αυτός ο αγώνας δεν ανήκει σε πρωτάθλημα.'}
      </div>
    </div>`;
    return;
  }

  const { championship_id, championship_title, championship_code, rounds_done, published_at, individual=[], team=[] } = champData;
  const medals  = {1:'🥇',2:'🥈',3:'🥉'};
  const pubDate = new Date(published_at).toLocaleString('el-GR');
  const displayTitle = championship_title || championship_id;

  const numRaces = individual.length ? (individual[0].raceResults||[]).length : 0;

  // ── Ατομική rows ──
  const indivRows = individual.length === 0
    ? `<tr><td colspan="${5 + numRaces*2}" style="text-align:center;padding:18px;color:var(--muted);">Δεν υπάρχουν αποτελέσματα</td></tr>`
    : individual.map(a => {
        const medal = medals[a.champRank] || a.champRank;
        const rkc   = a.champRank<=3?`rk${a.champRank}`:'rko';
        const raceCols = (a.raceResults||[]).map(r =>
          r && r.rank < 900
            ? `<td class="sub-score" style="text-align:center;">${r.points}</td>
               <td class="sub-score" style="text-align:center;color:var(--cyan);font-weight:700;">${r.rank}</td>`
            : `<td class="sub-score" style="text-align:center;color:var(--muted);">0</td>
               <td class="sub-score" style="text-align:center;color:var(--red);">—</td>`
        ).join('');
        return `<tr class="${a.champRank<=3?'r'+a.champRank:''}">
          <td class="rank-cell ${rkc}">${medal}</td>
          <td>
            <span class="ath-name">${a.lastname} ${a.firstname}</span><br>
            <span class="ath-club">${a.club||''}</span>
          </td>
          <td class="sub-score" style="text-align:center;color:var(--muted);">${a.sponsor||'—'}</td>
          ${raceCols}
          <td class="sub-score" style="text-align:center;color:var(--green);font-weight:700;">${a.totalPoints}</td>
          <td class="score-val" style="text-align:center;color:var(--gold);font-weight:700;">${a.totalRanks}</td>
        </tr>`;
      }).join('');

  // ── Ομαδική rows ──
  const numRacesTeam = team.length ? (team[0].raceResults||[]).length : 0;
  const teamRows = team.length === 0
    ? `<tr><td colspan="${3 + numRacesTeam*2}" style="text-align:center;padding:18px;color:var(--muted);">Δεν υπάρχουν αποτελέσματα</td></tr>`
    : team.map(t => {
        const medal = medals[t.rank] || t.rank;
        const rkc   = t.rank<=3?`rk${t.rank}`:'rko';
        const raceCols = (t.raceResults||[]).map(r =>
          r
            ? `<td class="sub-score" style="text-align:center;color:var(--cyan);font-weight:700;">${r.dailyRank||'—'}</td>
               <td class="sub-score" style="text-align:center;color:var(--amber);">${r.totalPenalty||'—'}</td>`
            : `<td class="sub-score" style="text-align:center;color:var(--muted);">—</td>
               <td class="sub-score" style="text-align:center;color:var(--muted);">—</td>`
        ).join('');
        return `<tr class="${t.rank<=3?'r'+t.rank:''}">
          <td class="rank-cell ${rkc}">${medal}</td>
          <td><span class="ath-name">${t.club}</span></td>
          ${raceCols}
          <td class="score-val" style="text-align:center;color:var(--gold);font-weight:700;">${t.totalDailyRanks}</td>
          <td class="sub-score" style="text-align:center;color:var(--amber);">${t.totalPenalty}</td>
          <td class="sub-score" style="text-align:center;color:var(--green);">${Math.round(t.totalPoints||0)}</td>
        </tr>`;
      }).join('');

  main.innerHTML = `<div id="champView">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,rgba(255,214,0,.08),rgba(255,143,0,.06));border:1px solid rgba(255,214,0,.25);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div>
        <div style="font-size:.7em;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;">🏆 Πρωτάθλημα</div>
        <div style="font-size:.95em;font-weight:700;color:var(--white);">${displayTitle}</div>
        ${championship_code ? `<div style="font-size:.7em;color:var(--muted);">${championship_code}</div>` : ''}
        <div style="font-size:.7em;color:var(--muted);margin-top:2px;">Ενημερώθηκε: ${pubDate}</div>
      </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span class="meta-chip" style="background:rgba(255,214,0,.12);color:var(--gold);">📊 ${rounds_done} Αγωνιστικ${rounds_done===1?'ή':'ές'}</span>
        <button onclick="refreshChampionship()" style="background:rgba(0,200,224,.12);border:1px solid rgba(0,200,224,.3);color:var(--cyan);border-radius:6px;padding:4px 12px;font-size:.78em;cursor:pointer;">🔄 Ανανέωση</button>
      </div>
    </div>

    <!-- Ατομική -->
    <div class="results-card" style="margin-bottom:12px;">
      <div class="results-card-hdr">
        <span class="results-card-title">ΑΤΟΜΙΚΗ ΚΑΤΑΤΑΞΗ ΠΡΩΤΑΘΛΗΜΑΤΟΣ</span>
      </div>
      <div class="overall-table-wrap">
        <table class="rtable">
          <thead>
            <tr>
              <th style="width:38px;">#</th>
              <th>ΑΘΛΗΤΗΣ</th>
              <th style="text-align:center;color:var(--muted);">ΧΟΡΗΓΟΣ</th>
              ${Array.from({length:numRaces},(_,i)=>`<th colspan="2" style="text-align:center;background:rgba(74,158,202,.15);color:var(--cyan);">${i+1}ος Αγώνας</th>`).join('')}
              <th style="text-align:center;color:var(--green);">Σύνολο</th>
              <th style="text-align:center;color:var(--gold);">Βαθμός</th>
            </tr>
            <tr>
              <th colspan="3"></th>
              ${Array.from({length:numRaces},()=>`<th style="text-align:center;font-size:.7em;color:var(--muted);">Πόντοι</th><th style="text-align:center;font-size:.7em;color:var(--muted);">Κατ.</th>`).join('')}
              <th></th><th></th>
            </tr>
          </thead>
          <tbody>${indivRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Ομαδική -->
    <div class="results-card">
      <div class="results-card-hdr">
        <span class="results-card-title">ΟΜΑΔΙΚΗ ΚΑΤΑΤΑΞΗ ΠΡΩΤΑΘΛΗΜΑΤΟΣ</span>
      </div>
      <div class="overall-table-wrap">
        <table class="rtable">
          <thead>
            <tr>
              <th style="width:38px;">#</th>
              <th>ΣΥΛΛΟΓΟΣ</th>
              ${Array.from({length:numRacesTeam},(_,i)=>`<th colspan="2" style="text-align:center;background:rgba(74,158,202,.15);color:var(--cyan);">${i+1}ος Αγώνας</th>`).join('')}
              <th style="text-align:center;color:var(--gold);">Άθρ.Θέσεων</th>
              <th style="text-align:center;color:var(--amber);">Άθρ.Ποινών</th>
              <th style="text-align:center;color:var(--green);">Σύν.Βάρος</th>
            </tr>
            <tr>
              <th colspan="2"></th>
              ${Array.from({length:numRacesTeam},()=>`<th style="text-align:center;font-size:.7em;color:var(--muted);">Θέση</th><th style="text-align:center;font-size:.7em;color:var(--muted);">Βαθμ.</th>`).join('')}
              <th></th><th></th><th></th>
            </tr>
          </thead>
          <tbody>${teamRows}</tbody>
        </table>
      </div>
    </div>

    <div class="footer">SFM Live v10 · Πρωτάθλημα</div>
  </div>`;
}

async function refreshChampionship() {
  champData = null;
  await renderChampionship();
  showToast('🔄 Ανανεώθηκε!');
}
</script>
